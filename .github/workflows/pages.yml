name: Deploy versioned game to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test tests/*.test.mjs

  deploy:
    needs: verify
    uses: wearemeatbags/wearemeatbags.github.io/.github/workflows/versioned-game-pages.yml@main
    with:
      game: splitbeat
      install_command: ":"
      build_command: mkdir -p dist && cp index.html dist/index.html
      output_directory: dist
